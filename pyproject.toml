[tool.black]
line-length = 100
target-version = ["py310", "py311"]

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "B", "UP", "C90", "N", "S", "W"]
ignore = ["E501"]
exclude = [
  ".venv",
  "dist",
  "build",
  "alembic/versions",
]

[tool.pytest.ini_options]
addopts = "-q"
asyncio_mode = "auto"
pythonpath = ["."]

[tool.coverage.run]
source = ["app"]
branch = true

[tool.coverage.report]
omit = [
  "app/__init__.py",
  "app/migrations/*",
]
show_missing = true